<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAM Cockpit — Pilotage Comptes Clés</title>
    
    <!-- SEO & OpenGraph Meta Tags -->
    <meta name="description" content="Cockpit de pilotage business pour le suivi des Comptes Clés (KAM) et Sponsors en temps réel.">
    <meta property="og:title" content="KAM Cockpit — Pilotage Comptes Clés">
    <meta property="og:description" content="Dashboard connecté de suivi des indicateurs business, commerciaux et plans d'actions KAM.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="KAM Cockpit — Pilotage">
    <meta name="twitter:description" content="Cockpit de pilotage business pour le suivi des Comptes Clés en temps réel.">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- Password Gate -->
    <div id="passwordGate" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg-primary, #0d0f1a);">
        <div style="background:var(--bg-card, #1a1d2e);border:1px solid var(--border-subtle, rgba(255,255,255,0.08));border-radius:20px;padding:48px 40px;text-align:center;max-width:400px;width:90%;box-shadow:0 32px 64px rgba(0,0,0,0.4);">
            <div style="font-size:3rem;margin-bottom:16px;">🔐</div>
            <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:8px;color:var(--text-primary,#f8fafc);">KAM Cockpit</h2>
            <p style="color:var(--text-muted,#94a3b8);font-size:0.88rem;margin-bottom:28px;">Accès réservé — Entrez le mot de passe</p>
            <input type="password" id="pwdInput" placeholder="Mot de passe..." autocomplete="current-password"
                   style="width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border-subtle,rgba(255,255,255,0.1));background:var(--bg-input,rgba(255,255,255,0.05));color:var(--text-primary,#f8fafc);font-size:1rem;margin-bottom:12px;box-sizing:border-box;outline:none;">
            <div id="pwdError" style="color:#ef4444;font-size:0.8rem;margin-bottom:12px;min-height:1em;"></div>
            <button id="pwdSubmit" style="width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#637aff,#8b5cf6);color:#fff;font-weight:700;font-size:1rem;cursor:pointer;">Entrer dans le Cockpit 🚀</button>
        </div>
    </div>

    <div class="app" id="appRoot" style="display:none;">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <img src="logo.jpg" alt="JÏZ" style="height:42px; width:auto; border-radius:8px; display:block;">
                <div>
                    <h1 class="header-title">KAM Cockpit</h1>
                    <p class="header-subtitle">Pilotage Comptes Clés</p>
                </div>
            </div>
            <div class="header-right">
                <span class="header-date" id="headerDate"></span>
                <button class="btn btn-ghost" id="themeToggle" title="Changer le thème">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Tab Navigation -->
        <nav class="tabs" id="tabNav">
            <button class="tab active" data-tab="comex">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/>
                </svg>
                Dashboard COMEX
            </button>
        </nav>

        <!-- Content Area -->
        <main class="content" id="contentArea">
            <div id="skeletonLoader" class="skeleton-container" style="padding: 20px 0;">
                <div class="skeleton-line" style="width: 250px; height: 32px; margin-bottom: 8px;"></div>
                <div class="skeleton-line" style="width: 400px; height: 16px; margin-bottom: 32px;"></div>
                <div class="comex-stats-business skeleton-section">
                    <div class="skeleton-box" style="height: 120px;"></div>
                    <div class="skeleton-box" style="height: 120px;"></div>
                </div>
                <div class="comex-stats skeleton-section" style="margin-top: 24px;">
                    <div class="skeleton-box" style="height: 80px;"></div>
                    <div class="skeleton-box" style="height: 80px;"></div>
                    <div class="skeleton-box" style="height: 80px;"></div>
                    <div class="skeleton-box" style="height: 80px;"></div>
                </div>
                <div class="comex-grid" style="margin-top: 24px;">
                    <div class="skeleton-box" style="height: 250px;"></div>
                    <div class="skeleton-box" style="height: 250px;"></div>
                </div>
            </div>
            <!-- Dynamic content rendered by JS -->
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="deleteConfirmOverlay">
        <div class="modal" style="max-width:380px;text-align:center;">
            <div style="font-size:2.5rem;margin-bottom:12px;">⚠️</div>
            <h3 style="margin-bottom:8px;">Supprimer cette action ?</h3>
            <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:24px;">Cette action sera définitivement supprimée de la base de données.</p>
            <div style="display:flex;gap:12px;justify-content:center;">
                <button class="btn btn-ghost" id="deleteCancelBtn">Annuler</button>
                <button class="btn btn-danger" id="deleteConfirmBtn">🗑️ Supprimer</button>
            </div>
        </div>
    </div>

    <!-- Modal for adding actions -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="actionModal">
            <div class="modal-header">
                <h3>Nouvelle action</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="actionForm">
                <input type="hidden" id="formAccountId">
                <div class="form-group">
                    <label for="formAction">Action</label>
                    <input type="text" id="formAction" placeholder="Décrire l'action..." required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="formResponsible">Responsable</label>
                        <input type="text" id="formResponsible" placeholder="Nom du responsable" required>
                    </div>
                    <div class="form-group">
                        <label for="formDeadline">Deadline</label>
                        <input type="date" id="formDeadline" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="formNextAction">Prochaine action concrète</label>
                    <input type="text" id="formNextAction" placeholder="Ex : Envoyer la proposition...">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-ghost" id="modalCancel">Annuler</button>
                    <button type="submit" class="btn btn-primary">Ajouter</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for editing account info -->
    <div class="modal-overlay" id="editAccountOverlay">
        <div class="modal" id="editAccountModal">
            <div class="modal-header">
                <h3>Modifier le compte</h3>
                <button class="modal-close" id="editAccountClose">&times;</button>
            </div>
            <form id="editAccountForm">
                <input type="hidden" id="editAccountId">
                <div class="form-row">
                    <div class="form-group">
                        <label for="editKam">KAM</label>
                        <input type="text" id="editKam" placeholder="Nom du KAM" required>
                    </div>
                    <div class="form-group">
                        <label for="editSponsor">Sponsor</label>
                        <input type="text" id="editSponsor" placeholder="Nom du sponsor" required>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-ghost" id="editAccountCancel">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
